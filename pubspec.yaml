name: ai_coach
description: World Bank AI Teaching Coach - TEACH Framework Analysis
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # State Management
  provider: ^6.1.1
  
  # HTTP & API
  dio: ^5.4.0
  http: ^1.1.0
  
  # Local Storage
  shared_preferences: ^2.2.2
  sqflite: ^2.3.0
  path_provider: ^2.1.1
  
  # Audio Recording & Playback
  record: ^6.1.2
  audioplayers: ^6.0.0
  
  # Text-to-Speech
  flutter_tts: ^3.8.5
  
  # Charts & Visualization
  fl_chart: ^0.65.0
  percent_indicator: ^4.2.3
  
  # Utilities
  connectivity_plus: ^5.0.2
  file_picker: ^8.0.0
  uuid: ^4.2.2
  intl: ^0.18.1
  
  # UI
  cupertino_icons: ^1.0.2

  # Notifications & Permissions
  flutter_local_notifications: ^17.0.0
  permission_handler: ^11.3.0
  flutter_markdown: ^0.7.7+1
  google_fonts: ^8.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true
  
  # Add fonts if needed
  # fonts:
  #   - family: Inter
  #     fonts:
  #       - asset: fonts/Inter-Regular.ttf
  #       - asset: fonts/Inter-Bold.ttf
  #         weight: 700

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon.png"
  min_sdk_android: 21

